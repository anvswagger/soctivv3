name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        env:
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_COMMIT_SHA: ${{ github.sha }}
        run: npm run build

      - name: Bundle budget check
        env:
          BUNDLE_MAX_ENTRY_KB: "350"
          BUNDLE_MAX_MAIN_ROUTE_KB: "65"
          BUNDLE_MAX_CHUNK_KB: "700"
          BUNDLE_MAX_TOTAL_JS_KB: "2800"
          BUNDLE_ROUTE_CHUNK_LIMITS: "Settings=80,PublicBooking=35"
        run: npm run bundle:check

      - name: Env parity check
        run: npm run ci:env

      - name: Migration checks
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: npm run ci:migrations
