<body>
  <div id="root"></div>
  <!-- Non-critical scripts - use module preload for critical entry -->
  <link rel="modulepreload" href="/src/main.tsx">
  <script type="module" src="/src/main.tsx" defer></script>
  
  <!-- Wistia player - load after LCP window -->
  <script>
    // Load Wistia after 1 second - after LCP completes, no blocking
    setTimeout(() => {
      const script = document.createElement('script');
      script.src = 'https://fast.wistia.com/player.js';
      script.async = true;
      document.body.appendChild(script);
    }, 1000);
  </script>

  <!-- Facebook Pixel Code - Load after first interaction -->
  <script>
    let pixelLoaded = false;
    function loadFacebookPixel() {
      if (pixelLoaded) return;
      pixelLoaded = true;
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.defer = true;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '1454656709210600');
      fbq('track', 'PageView');
    }
    
    // Load after first user interaction only
    window.addEventListener('click', loadFacebookPixel, { once: true, passive: true });
    window.addEventListener('scroll', loadFacebookPixel, { once: true, passive: true });
  </script>
  <!-- End Facebook Pixel Code -->

  <!-- Facebook Pixel NoScript Fallback -->
  <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=1454656709210600&ev=PageView&noscript=1" /></noscript>
  <!-- End Facebook Pixel NoScript -->

  <!-- Progressive video placeholder while Wistia loads -->
  <style>
    wistia-player:not(:defined) {
      background-color: #000;
      background-image: url('https://embed-ssl.wistia.com/deliveries/dff7db668c38f9c01677486050d6e00192c01e66.webp?image_crop_resized=960x540');
      background-size: cover;
      background-position: center;
      display: block;
      position: relative;
      min-height: 200px;
    }

    wistia-player:not(:defined)::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 68px;
      height: 48px;
      background-color: rgba(0, 188, 212, 0.9);
      border-radius: 5px;
      z-index: 10;
    }

    wistia-player:not(:defined)::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-35%, -50%);
      width: 0;
      height: 0;
      border-top: 14px solid transparent;
      border-bottom: 14px solid transparent;
      border-left: 22px solid white;
      z-index: 20;
    }
  </style>
