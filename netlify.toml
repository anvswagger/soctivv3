[build]
  command = "npm ci && npm run ci:env && npm run build && xcopy /E /Y SoctivLP dist\\landing\\"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # Set in Netlify UI (do not commit secrets): VITE_SUPABASE_URL and
  # VITE_SUPABASE_PUBLISHABLE_KEY (or VITE_SUPABASE_ANON_KEY)

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/landing/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/"
  to = "/landing/index.html"
  status = 200

[[redirects]]
  from = "/landing/*"
  to = "/landing/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
