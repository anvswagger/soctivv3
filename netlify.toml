[build]
  command = "npm ci && npm run ci:env && npm run build && cp -r SoctivLP/. dist/ && cp -r SoctivLP/assets dist/ 2>/dev/null || true"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # Set in Netlify UI (do not commit secrets): VITE_SUPABASE_URL and
  # VITE_SUPABASE_PUBLISHABLE_KEY (or VITE_SUPABASE_ANON_KEY)

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "text/css"

[[headers]]
  for = "*.html"
  [headers.values]
    Content-Type = "text/html; charset=utf-8"

[[headers]]
  for = "*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"

[[headers]]
  for = "*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[redirects]]
  from = "/app"
  to = "/app/index.html"
  status = 301

[[redirects]]
  from = "/app/"
  to = "/app/index.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200

# Landing page is at root - no redirect needed
# Netlify will serve /index.html by default
