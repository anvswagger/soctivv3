[build]
  command = "npm ci && npm run ci:env && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # Set in Netlify UI (do not commit secrets): VITE_SUPABASE_URL and
  # VITE_SUPABASE_PUBLISHABLE_KEY (or VITE_SUPABASE_ANON_KEY)

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "text/css"

[[headers]]
  for = "*.html"
  [headers.values]
    Content-Type = "text/html; charset=utf-8"

[[headers]]
  for = "*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"

[[headers]]
  for = "*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

# SPA fallback for React Router browser history.
# Keep this in netlify.toml as well as public/_redirects so Netlify
# applies it whether the deploy reads config or copied static files first.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Edge function: per-subdomain routing for published landing pages.
# Reads the request's Host header and rewrites `*.soctiv.ly` requests to
# the matching landing page directory (using `/_subdomain_map.json`).
# Runs BEFORE static file serving and BEFORE the SPA fallback above, so
# visitors hitting a landing-page subdomain never see the React app.
# See netlify/edge-functions/subdomain-router.ts for the source.
[[edge_functions]]
  function = "subdomain-router"
  path = "/*"
