<!doctype html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>رائع! شركتكم مؤهلة | سوكتيف</title>
    <link rel="icon" type="image/webp" href="assets/logo.webp" fetchpriority="high">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="dist/styles.css" fetchpriority="high">
    <style>
        .result-page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            text-align: center;
            padding: 20px
        }

        .result-card {
            background: var(--surface-strong);
            border: 1px solid var(--outline);
            border-radius: 24px;
            padding: 60px 40px;
            width: min(600px, 100%);
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5)
        }
    </style>
</head>

<body>
    <header class="brand">
        <img class="logo" src="assets/logo.webp" alt="شعار سوكتيف" width="50" height="50">
    </header>

    <main class="result-page">
        <div class="result-card">
            <div class="result-icon success" style="margin-bottom:30px;">✓</div>
            <h1 style="font-size:2.2rem;margin-bottom:20px;">رائع! شركتكم مؤهلة</h1>
            <p style="font-size:1.2rem;color:var(--muted);line-height:1.6;margin-bottom:40px;">
                بناءً على إجاباتكم، شركتكم مطابقة لمعاييرنا. تواصلوا معنا عبر واتساب الآن للبدء في توسيع أعمالكم ومناقشة
                التفاصيل.
            </p>
            <a class="primary-btn"
                href="https://wa.me/218914180440?text=السلام عليكم، نحن مهتمون ونحن مستعدون للبدء في توسيع أعمالنا وندرس معكم التفاصيل.">
                تواصل معنا عبر واتساب
            </a>
        </div>
    </main>
</body>

</html>
