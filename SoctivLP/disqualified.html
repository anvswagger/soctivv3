<!doctype html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>نشكركم على اهتمامكم | سوكتيف</title>
    <link rel="icon" type="image/webp" href="assets/logo.webp">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="styles.css">
    <style>
        .result-page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            text-align: center;
            padding: 20px;
        }

        .result-card {
            background: var(--surface-strong);
            border: 1px solid var(--outline);
            border-radius: 24px;
            padding: 60px 40px;
            width: min(600px, 100%);
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>
    <header class="brand">
        <img class="logo" src="assets/logo.webp" alt="شعار سوكتيف">
    </header>

    <main class="result-page">
        <div class="result-card">
            <div class="result-icon failure" style="margin-bottom: 30px;">!</div>
            <h1 style="font-size: 2.2rem; margin-bottom: 20px;">عذراً، المعايير لا تنطبق حالياً</h1>
            <p style="font-size: 1.2rem; color: var(--muted); line-height: 1.6; margin-bottom: 40px;">
                نشكركم على اهتمامكم بسوكتيف. خدماتنا مصممة حالياً لدعم الشركات في مراحل نمو محددة. نتمنى لكم كل التوفيق
                في مشاريعكم القادمة وتطور أعمالكم.
            </p>
            <a href="index.html" style="color: var(--accent); text-decoration: none; font-weight: 600;">العودة
                للرئيسية</a>
        </div>
    </main>
</body>

</html>
