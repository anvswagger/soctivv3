<!doctype html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>نشكركم على اهتمامكم | سوكتيف</title>
    <link rel="icon" type="image/webp" href="assets/logo.webp" fetchpriority="high">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="dist/styles.css" fetchpriority="high">
    <style>
        * {
            font-family: 'Alexandria', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(170deg, #030913 0%, #061223 58%, #08192a 100%);
            color: #f5f9ff
        }

        .result-page {
            flex: 1;
            display: grid;
            place-items: center;
            text-align: center;
            padding: 20px
        }

        .result-card {
            background: rgba(10, 23, 40, 0.92);
            border: 1px solid rgba(71, 158, 221, 0.38);
            border-radius: 24px;
            padding: 60px 40px;
            width: min(600px, 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: fadeInUp .6s ease-out forwards
        }

        .result-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 auto 25px
        }

        .result-icon.failure {
            background: rgba(239, 68, 68, 0.15);
            border: 2px solid rgba(239, 68, 68, 0.5);
            color: #ef4444
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .brand {
            position: absolute;
            top: 20px;
            right: 20px
        }

        .brand img {
            width: 50px;
            height: 50px;
            object-fit: contain
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 30px;
            border-radius: 999px;
            border: 1px solid rgba(57, 200, 255, 0.5);
            background: linear-gradient(135deg, #39c8ff 0%, #169fd7 100%);
            color: #012235;
            font-weight: 700;
            text-decoration: none;
            transition: all .3s ease;
            margin-top: 30px
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(57, 200, 255, 0.3)
        }
    </style>
</head>

<body>
    <header class="brand">
        <img src="assets/logo.webp" alt="شعار سوكتيف" width="50" height="50">
    </header>

    <main class="result-page">
        <div class="result-card">
            <div class="result-icon failure">✗</div>
            <h1 style="font-size:2.2rem;margin-bottom:20px;">نشكركم على اهتمامكم</h1>
            <p
                style="font-size:1.2rem;color:#afc6df;line-height:1.6;margin-bottom:40px;max-width:500px;margin-left:auto;margin-right:auto;">
                بناءً على إجاباتكم، نعتذر لعدم قدرتنا على تقديم الخدمة حالياً.<br>
                يمكنكم التواصل معنا مستقبلاً أو متابعة صفحتنا للتحديثات.
            </p>
            <a class="cta-button" href="index.html">
                العودة للصفحة الرئيسية
            </a>
        </div>
    </main>
</body>

</html>
